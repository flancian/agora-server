{% extends 'base.html' %}

{% block content %}
<div class="info-box with-spacing" style="text-align: center; margin-top: 2em; padding: 2em;">
    <h1>500 - Server Resting</h1>
    <p>The Agora is currently processing a heavy thought or undergoing maintenance.</p>
    
    <button onclick="window.location.reload()" style="margin-top: 1em; padding: 0.5em 1em; cursor: pointer;">🔄 Try again now</button>

    <div style="margin-top: 1.5em; color: var(--link-color); opacity: 0.8;">
        <em>Automatically retrying in <span id="retry-countdown">30</span> seconds...</em>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let seconds = 30;
        const countdownSpan = document.getElementById("retry-countdown");

        if (countdownSpan) {
            countdownSpan.innerText = seconds;
            const interval = setInterval(() => {
                seconds--;
                countdownSpan.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.reload();
                }
            }, 1000);
        }
    });
</script>
{% endblock %}

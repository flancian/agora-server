{% if not subnode %}
<details class="minigame-wrapper node sortable-section" id="interactive-empty-state-details" data-section="games">
    <summary class="minigame-header">
        <span class="minigame-header-title">
            <span class="drag-handle" title="Drag to reorder this section">≡</span>
            <strong>🎮 Agora games</strong>
        </span>
        <span class="summary-scroll-content">
            <span id="tab-hexgame" class="ai-provider-tab game-tab" style="margin-left: 10px;">Hexgame</span> •
            <span id="tab-conway" class="ai-provider-tab game-tab">Conway's</span>
        </span>
    </summary>
    
    <div class="info-box with-spacing" info-box-id="minigames">
        <span id="game-help-text"><em>Agora games: choose one above!</em></span>
        <span info-box-id="minigames" class="dismiss-button" title="Dismiss this tooltip.">x</span>
    </div>
    
    <div style="padding: 1em;" id="interactive-empty-state-content">
        <!-- Canvas/Game elements will be dynamically loaded here by main.ts -->
    </div>
</details>
{% endif %}

# Example Nginx Configuration for the Agora Server
# Based on the production environment (thecla) as of May 2026.
# 
# This file is an EXAMPLE and should be modified to match your specific paths,
# domain names, and SSL setup before being copied to /etc/nginx/sites-available/.

server {
    listen 80;
    listen [::]:80;
    server_name anagora.org;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name anagora.org;

    # --- SSL Configuration ---
    # These paths are typically managed by Certbot automatically.
    # ssl_certificate /etc/letsencrypt/live/anagora.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/anagora.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html index.htm;

    # --- Self-Healing Error Pages ---
    # Custom 5xx error page handling
    error_page 500 502 503 504 /static/500.html;

    # --- Static Assets ---
    location /assets/ {
        root /var/www/agora/;
    }

    location /favicon.ico {
        alias /home/agora/agora-server/app/static/favicon.ico;
    }

    location /robots.txt {
        alias /home/agora/agora-server/app/static/robots.txt;
    }

    # Serve static files directly (bypassing uWSGI)
    location /static/ {
        alias /home/agora/agora-server/app/static/;
    }

    # --- uWSGI App Routing ---
    location /random {
        # Opt out of caching for random routes
        include uwsgi_params;
        uwsgi_pass unix:/tmp/agora-uwsgi.sock;
    }

    location / {
        # uWSGI caching settings (ensure agora-cache is defined in nginx.conf)
        # uwsgi_cache agora-cache;
        # uwsgi_cache_key $scheme$host$request_uri;
        
        include uwsgi_params;
        uwsgi_pass unix:/tmp/agora-uwsgi.sock;
    }
}

# ---------------------------------------------------------
# Example: Bullpen / Hosted Gardens (edit.anagora.org)
# ---------------------------------------------------------
server {
    listen 443 ssl;
    server_name edit.anagora.org;

    # SSL certificates would go here...

    location / {
        # Proxy pass to the Bullpen editor running on port 5019
        proxy_pass http://127.0.0.1:5019;
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Required for hot-reload/editors)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

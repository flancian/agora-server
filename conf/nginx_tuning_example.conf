# System-wide Nginx Tuning Example for Agora
# These directives must be added to the main /etc/nginx/nginx.conf file,
# not inside the sites-available/ server blocks.

# --- Global Settings ---
# Nginx is heavily targeted by botnets and crawlers. It is crucial to 
# raise the file descriptor limit, or Nginx will throw "Too many open files"
# errors and become unable to serve even static fallback pages during a spike.
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    # The default is usually 1024. Raise this to handle the 
    # file descriptor limit comfortably.
    worker_connections 4096;
}

http {
    # Defines the cache path used by the `uwsgi_cache agora-cache` directive
    # in the server block.
    # uwsgi_cache_path /var/cache/nginx levels=1:2 keys_zone=agora-cache:10m max_size=1g inactive=60m use_temp_path=off;

    # ... remaining http config ...
}
